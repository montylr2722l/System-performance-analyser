<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Database Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <main class="mx-auto w-full max-w-3xl px-4 py-6 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-4 border-b border-zinc-800 pb-5 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-sm font-medium uppercase tracking-wide text-cyan-300">MySQL</p>
        <h1 class="mt-2 text-3xl font-bold tracking-normal text-white">Database Settings</h1>
        <p class="mt-2 text-sm text-zinc-400">Enter the same username and password you use in MySQL Workbench.</p>
      </div>
      <nav class="flex flex-wrap gap-2">
        <a class="nav-link" href="{{ url_for('index') }}">Dashboard</a>
        <a class="nav-link" href="{{ url_for('history') }}">History</a>
        <a class="nav-link" href="{{ url_for('graph') }}">Graph</a>
        <a class="nav-link active" href="{{ url_for('settings') }}">Settings</a>
      </nav>
    </header>

    {% if message is not none %}
      <div class="mt-6 rounded-md border p-4 text-sm {% if ok %}border-emerald-500/40 bg-emerald-500/10 text-emerald-100{% else %}border-red-500/40 bg-red-500/10 text-red-100{% endif %}">
        {{ message }}
      </div>
    {% endif %}

    {% if not db_status.ok %}
      <div class="mt-6 rounded-md border border-amber-500/40 bg-amber-500/10 p-4 text-sm text-amber-100">
        Current connection issue: {{ db_status.message }}
      </div>
    {% endif %}

    <section class="panel mt-6">
      <form method="post" class="grid gap-4">
        <label class="field-label">
          Host
          <input class="field-input" type="text" name="host" value="{{ config.host }}" required>
        </label>
        <label class="field-label">
          Port
          <input class="field-input" type="number" name="port" value="{{ config.port }}" required>
        </label>
        <label class="field-label">
          Username
          <input class="field-input" type="text" name="user" value="{{ config.user }}" required>
        </label>
        <label class="field-label">
          Password
          <input class="field-input" type="password" name="password" placeholder="{% if config.password %}Saved password is set{% else %}Enter MySQL password{% endif %}">
        </label>
        <label class="field-label">
          Database
          <input class="field-input" type="text" name="database" value="{{ config.database }}" required>
        </label>
        <div class="mt-2 flex flex-wrap gap-2">
          <button class="primary-btn" type="submit">Save &amp; Test Connection</button>
          <a class="secondary-btn" href="{{ url_for('index') }}">Back to Dashboard</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
